<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/assets/logo.svg">
  <link rel="apple-touch-icon" href="/assets/logo.svg">
  <title>Esqueci minha senha — Carona</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="accessibility.css">
  <link rel="stylesheet" href="dashboard.css">
</head>
<body class="auth-page">

  <div class="auth-container">
    <a href="/" class="logo auth-logo">
      <span class="logo-icon">🚗</span>
      <span class="logo-text">
        <strong>Carona</strong>
        <small>Mais barato que ônibus.</small>
        <small class="logo-tagline">🇧🇷 100% brasileiro</small>
      </span>
    </a>

    <div class="auth-card">
      <div class="auth-header">
        <span class="auth-emoji">🔑</span>
        <h1>Esqueceu sua senha?</h1>
        <p>Informe seu e-mail e enviaremos instruções para redefinir sua senha</p>
      </div>

      <form id="forgotForm" novalidate>
        <div class="form-group">
          <label for="email">E-mail</label>
          <input type="email" id="email" name="email" placeholder="seu@email.com" required autocomplete="email">
        </div>
        <button type="submit" class="btn btn-primary btn-submit" id="forgotBtn">
          📧 Enviar link de redefinição
        </button>
        <p class="form-feedback" id="forgotFeedback" role="status"></p>
        <div class="auth-reset-hint" id="resetHint" hidden>
          <p>Como ainda não temos envio de e-mail configurado, use o link abaixo:</p>
          <p><a href="#" id="resetLink"></a></p>
        </div>
      </form>

      <a href="login.html" class="auth-back-link">← Voltar para o login</a>
    </div>

    <div class="auth-features">
      <div class="auth-feature">💸 Taxa de apenas 5%</div>
      <div class="auth-feature">🔒 Login seguro</div>
      <div class="auth-feature">🇧🇷 100% brasileiro</div>
    </div>
  </div>

  <script src="js/api.js?v=2"></script>
  <script src="js/utils.js"></script>
  <script src="js/esqueci-senha.js"></script>
  <script src="js/accessibility.js"></script>
</body>
</html>
