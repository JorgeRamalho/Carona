<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/assets/logo.svg">
  <link rel="apple-touch-icon" href="/assets/logo.svg">
  <title>Redefinir senha — Carona</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="accessibility.css">
  <link rel="stylesheet" href="dashboard.css">
</head>
<body class="auth-page">

  <div class="auth-container">
    <a href="/" class="logo auth-logo">
      <span class="logo-icon">🚗</span>
      <span class="logo-text">
        <strong>Carona</strong>
        <small>Mais barato que ônibus.</small>
        <small class="logo-tagline">🇧🇷 100% brasileiro</small>
      </span>
    </a>

    <div class="auth-card">
      <div class="auth-header">
        <span class="auth-emoji">🔐</span>
        <h1>Nova senha</h1>
        <p>Crie uma nova senha para sua conta</p>
      </div>

      <form id="resetForm" novalidate>
        <input type="hidden" id="token" name="token">
        <div class="form-group">
          <label for="senha">Nova senha</label>
          <input type="password" id="senha" name="senha" placeholder="Mínimo 8 caracteres" required minlength="8" autocomplete="new-password">
        </div>
        <div class="form-group">
          <label for="confirmar_senha">Confirmar nova senha</label>
          <input type="password" id="confirmar_senha" name="confirmar_senha" placeholder="Repita a nova senha" required minlength="8" autocomplete="new-password">
        </div>
        <button type="submit" class="btn btn-primary btn-submit" id="resetBtn">
          ✅ Redefinir senha
        </button>
        <p class="form-feedback" id="resetFeedback" role="status"></p>
      </form>

      <a href="login.html" class="auth-back-link">← Voltar para o login</a>
    </div>

    <div class="auth-features">
      <div class="auth-feature">💸 Taxa de apenas 5%</div>
      <div class="auth-feature">🔒 Login seguro</div>
      <div class="auth-feature">🇧🇷 100% brasileiro</div>
    </div>
  </div>

  <script src="js/api.js?v=2"></script>
  <script src="js/utils.js"></script>
  <script src="js/redefinir-senha.js"></script>
  <script src="js/accessibility.js"></script>
</body>
</html>
