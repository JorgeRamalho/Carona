<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#22C55E">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Carona">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="icon" type="image/svg+xml" href="/assets/logo.svg">
  <link rel="apple-touch-icon" href="/assets/icon-192.png">
  <title>Entrar — Carona</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="accessibility.css">
  <link rel="stylesheet" href="dashboard.css">
</head>
<body class="auth-page">

  <div class="auth-container">
    <a href="/" class="logo auth-logo">
      <span class="logo-icon">🚗</span>
      <span class="logo-text">
        <strong>Carona</strong>
        <small>Mais barato que ônibus.</small>
        <small class="logo-tagline">🇧🇷 100% brasileiro</small>
      </span>
    </a>

    <div class="auth-card">
      <div class="auth-header">
        <span class="auth-emoji">👋</span>
        <h1>Bem-vindo de volta!</h1>
        <p>Entre na sua conta para continuar</p>
      </div>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="email">E-mail</label>
          <input type="email" id="email" name="email" placeholder="seu@email.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="senha">Senha</label>
          <input type="password" id="senha" name="senha" placeholder="Sua senha" required autocomplete="current-password">
        </div>
        <p class="auth-forgot-link">
          <a href="esqueci-senha.html">Esqueci minha senha</a>
        </p>
        <button type="submit" class="btn btn-primary btn-submit" id="loginBtn">
          🚀 Entrar
        </button>
        <p class="form-feedback" id="loginFeedback" role="status"></p>
      </form>

      <div class="auth-divider"><span>ou</span></div>

      <button type="button" class="btn btn-secondary btn-submit" data-pwa-install aria-label="Instalar aplicativo Carona">
        📲 Instalar app no dispositivo
      </button>

      <p class="auth-footer-text">
        Ainda não tem conta? <a href="/?tab=passageiro#cadastro-form">Cadastre-se grátis</a>
      </p>
    </div>

    <div class="auth-features">
      <div class="auth-feature">💸 Taxa de apenas 5%</div>
      <div class="auth-feature">🔒 Login seguro</div>
      <div class="auth-feature">🇧🇷 100% brasileiro</div>
    </div>
  </div>

  <script src="js/api.js?v=4"></script>
  <script src="js/auth.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/login.js"></script>
  <script src="js/pwa.js?v=4"></script>
  <script src="js/accessibility.js"></script>
</body>
</html>
